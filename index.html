<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!--
      GitHub Pages：深层路径会落到本仓根目录 404.html（即此站点的 index 副本）。
      将 /任意前缀/admin/... 重定向到管理端 Hash 路由，避免刷新后误载入用户端 SPA。
    -->
    <script>
      (function () {
        try {
          if (
            typeof globalThis.isSecureContext === "boolean" &&
            !globalThis.isSecureContext &&
            globalThis.crypto &&
            typeof globalThis.crypto.randomUUID !== "function"
          ) {
            globalThis.crypto.randomUUID = function () {
              return (
                Date.now().toString(36) +
                "-" +
                Math.random().toString(36).slice(2, 11)
              );
            };
          }
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var id = localStorage.getItem("zbzj_h5_font_palette_active_v1");
          if (id === "canglan") {
            document.documentElement.setAttribute("data-h5-font-palette", "canglan");
          }
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var p = location.pathname;
          var i = p.indexOf("/admin/");
          var base;
          var rest;
          if (i !== -1) {
            base = p.slice(0, i + "/admin".length);
            rest = p.slice(i + "/admin".length) || "/";
          } else if (p.endsWith("/admin")) {
            base = p;
            rest = "/";
          } else {
            return;
          }
          if (rest !== "/" && rest.indexOf("/") !== 0) rest = "/" + rest;
          if ((location.hash || "").replace(/^#/, "").length > 0) return;
          location.replace(location.origin + base + "/#" + rest + location.search);
        } catch (e) {}
      })();
    </script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#3d8b8b" />
    <title>竹本求真</title>
    <script type="module" crossorigin src="/culspace-web/assets/index-GqHQTLCR.js"></script>
    <link rel="stylesheet" crossorigin href="/culspace-web/assets/index-C-0LulkZ.css">
  
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script>
      (function () {
        var shown = false;
        function showStaleAssetHint() {
          if (shown) return;
          shown = true;
          var root = document.getElementById("root");
          if (!root) return;
          root.innerHTML =
            '<p style="font-family:sans-serif;padding:16px;line-height:1.6;color:#333;">页面资源已更新，请<strong>强制刷新</strong>（Ctrl+F5 / 清缓存）后重试。</p>';
        }
        window.addEventListener("vite:preloadError", showStaleAssetHint);
        document.addEventListener(
          "DOMContentLoaded",
          function () {
            document.querySelectorAll('script[type="module"]').forEach(function (el) {
              el.addEventListener("error", showStaleAssetHint);
            });
          },
          { once: true },
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
