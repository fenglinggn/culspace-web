<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!--
      GitHub Pages：深层路径会落到本仓根目录 404.html（即此站点的 index 副本）。
      将 /任意前缀/admin/... 重定向到管理端 Hash 路由，避免刷新后误载入学员端 SPA。
    -->
    <script>
      (function () {
        try {
          var p = location.pathname;
          var i = p.indexOf("/admin/");
          var base;
          var rest;
          if (i !== -1) {
            base = p.slice(0, i + "/admin".length);
            rest = p.slice(i + "/admin".length) || "/";
          } else if (p.endsWith("/admin")) {
            base = p;
            rest = "/";
          } else {
            return;
          }
          if (rest !== "/" && rest.indexOf("/") !== 0) rest = "/" + rest;
          if ((location.hash || "").replace(/^#/, "").length > 0) return;
          location.replace(location.origin + base + "/#" + rest + location.search);
        } catch (e) {}
      })();
    </script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d9488" />
    <title>竹本求真</title>
    <script type="module" crossorigin src="/culspace-web/assets/index-C5mcG4Ku.js"></script>
    <link rel="stylesheet" crossorigin href="/culspace-web/assets/index-Cs5TO2vE.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
